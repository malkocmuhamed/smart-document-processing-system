<mat-card class="dashboard-card">

    <div class="header">
        <h2>Documents</h2>
    </div>

    <table mat-table [dataSource]="documents()" class="table">

        <ng-container matColumnDef="fileName">
            <th mat-header-cell *matHeaderCellDef>File</th>
            <td mat-cell *matCellDef="let doc">{{ doc.fileName }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let doc">
                <span class="status" [ngClass]="doc.status">
                    {{ doc.status }}
                </span>
            </td>
        </ng-container>

        <!-- Date -->
        <ng-container matColumnDef="createdAt">
            <th mat-header-cell *matHeaderCellDef>Created</th>
            <td mat-cell *matCellDef="let doc">
                {{ doc.createdAt | date:'short' }}
            </td>
        </ng-container>

        <ng-container matColumnDef="errors">
            <th mat-header-cell *matHeaderCellDef>Issues</th>
            <td mat-cell *matCellDef="let doc">
                {{ errorCount(doc) }}
            </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>

            <td mat-cell *matCellDef="let doc">
                <button mat-button color="primary" (click)="viewDocument(doc.id)">
                    View
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

</mat-card>
